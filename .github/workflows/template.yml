name: Standard CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
      - 'feature/**'
  pull_request:
    branches:
      - main
      - dev
      - 'feature/**'

permissions:
  contents: read
  security-events: write
  actions: read
  id-token: write
  packages: write

jobs:
  # ==========================================
  # PARALLEL STAGE 1: FAST CHECKS
  # ==========================================
  gitleaks-scan:
    uses: nlttin/singpost-cicd-components/.github/workflows/reusable-workflow-gitleaks.yml@dev
    with:
      scan_mode: full
      config-ref: dev
      fail-on-detection: false
    secrets: inherit

  app-ci-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: |
          npm install || true
          npm test --if-present

  # ==========================================
  # STAGE 2: SECURITY SCANS
  # ==========================================
  codeql-scan:
    needs: [gitleaks-scan, app-ci-test]
    uses: nlttin/singpost-cicd-components/.github/workflows/reusable-workflow-codeql.yml@dev
    with:
      language: 'javascript-typescript'
      build-mode: 'none'
      queries: 'security-extended'

  # ==========================================
  # STAGE 3: DOCKER BUILD (GHCR)
  # ==========================================
  build-and-push:
    needs: codeql-scan
    uses: nlttin/singpost-cicd-components/.github/workflows/reusable-docker-build.yml@dev
    with:
      image-name: 'singpost-app-tracking'
      dockerfile: 'Dockerfile'
      context: '.'
      push: true
    secrets: inherit

  database-migration:
    needs: codeql-scan
    runs-on: ubuntu-latest
    steps:
      - run: echo "Mocking Flyway migration"

  # ==========================================
  # STAGE 4: DEPLOYMENTS (Cloud Build + Cloud Run)
  # ==========================================
  deploy-dev:
    needs: [build-and-push, database-migration]
    if: github.ref == 'refs/heads/dev'
    uses: nlttin/singpost-cicd-components/.github/workflows/reusable-cloud-run-deploy.yml@feature/gcp-cloud-run
    with:
      service-name: 'singpost-app-tracking-dev'
      image-name: 'singpost-app-tracking'
      project-id: ${{ vars.GCP_PROJECT_ID }}
      region: 'asia-southeast1'
      wif-provider: ${{ secrets.WIF_PROVIDER }}
      deployer-sa: ${{ secrets.GCP_DEPLOYER_SA }}
      runtime-sa: ${{ secrets.GCP_RUNTIME_SA }}
      min-instances: 0
      max-instances: 10
    secrets: inherit

  deploy-prod:
    needs: [build-and-push, database-migration]
    if: github.ref == 'refs/heads/main'
    uses: nlttin/singpost-cicd-components/.github/workflows/reusable-cloud-run-deploy.yml@feature/gcp-cloud-run
    with:
      service-name: 'singpost-app-tracking-prod'
      image-name: 'singpost-app-tracking'
      project-id: ${{ vars.GCP_PROJECT_ID }}
      region: 'asia-southeast1'
      wif-provider: ${{ secrets.WIF_PROVIDER }}
      deployer-sa: ${{ secrets.GCP_DEPLOYER_SA }}
      runtime-sa: ${{ secrets.GCP_RUNTIME_SA }}
      min-instances: 1
      max-instances: 20
    secrets: inherit

  # ==========================================
  # STAGE 5: NOTIFY
  # ==========================================
  notify:
    if: always()
    needs: [deploy-dev, deploy-prod]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Mocking GChat Webhook"
