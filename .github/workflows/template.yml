name: CI Pipeline

on:
  push:
    branches: [dev, main, 'feature/**']
  pull_request:
    branches: [dev, main]

permissions:
  contents: read
  security-events: write
  actions: read
  packages: write
  id-token: write

jobs:
  # ── Stage 1: Parallel fast checks ────────────────────────────────────
  gitleaks-scan:
    uses: nlttin/singpost-cicd-components/.github/workflows/reusable-workflow-gitleaks.yml@dev
    with:
      scan_mode: pr
      config-ref: dev
      fail-on-detection: false
    secrets: inherit

  eslint-scan:
    uses: nlttin/singpost-cicd-components/.github/workflows/reusable-eslint.yml@dev
    with:
      node_version: '20'
      config_file: 'eslint.config.mjs'
      file_patterns: 'src'
      fail_on_error: false
    secrets: inherit

  vitest:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Mocking vitest run"
  #vitest:
  #  uses: SINGAPORE-POST-LIMITED/singpost-cicd-components/.github/workflows/reusable-vitest.yml@feature/eslint-vitest
  #  with:
  #    node_version: '20'
  #    test_command: 'npx vitest run --coverage'
  #    fail_on_error: true
  #  secrets: inherit

  # ── Stage 2: CodeQL (needs Stage 1) ──────────────────────────────────
  codeql-scan:
    needs: [gitleaks-scan, eslint-scan, vitest]
    uses: nlttin/singpost-cicd-components/.github/workflows/reusable-workflow-codeql.yml@dev
    with:
      language: 'javascript-typescript'
      build-mode: 'none'
      queries: 'security-extended'

  # ── Stage 3: Docker build → GHCR (needs Stage 2) ─────────────────────
  build-and-push:
    needs: codeql-scan
    uses: nlttin/singpost-cicd-components/.github/workflows/reusable-docker-build.yml@dev
    with:
      image-name: 'singpost-app-tracking'
      dockerfile: 'Dockerfile'
      context: '.'
      push: ${{ github.ref_name == 'dev' || github.ref_name == 'main' }}
    secrets: inherit

  # ── Stage 4: Notify ──────────────────────────────────────────────────
  notify:
    if: always()
    needs: [build-and-push]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Mocking GChat Webhook"
