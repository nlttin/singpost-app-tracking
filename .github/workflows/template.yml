name: CI Pipeline

on:
  push:
    branches: [dev, main, 'feature/**']
  pull_request:
    branches: [dev, main]

permissions:
  contents: read
  security-events: write
  actions: read
  packages: write

jobs:
  # ── Stage 1: Parallel fast checks ────────────────────────────────────
  gitleaks-scan:
    uses: nlttin/singpost-cicd-components/.github/workflows/reusable-workflow-gitleaks.yml@dev
    with:
      scan_mode: ${{ github.event_name == 'pull_request' && 'pr' || 'full' }}
      config-ref: dev
      fail-on-detection: true
    secrets: inherit

  app-ci-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  # ── Stage 2: CodeQL (needs Stage 1) ──────────────────────────────────
  codeql-scan:
    needs: [gitleaks-scan, app-ci-test]
    uses: nlttin/singpost-cicd-components/.github/workflows/reusable-workflow-codeql.yml@dev
    with:
      language: 'javascript-typescript'
      build-mode: 'none'
      queries: 'security-extended'

  # ── Stage 3: Docker build → GHCR (needs Stage 2) ─────────────────────
  docker-build:
    needs: codeql-scan
    uses: nlttin/singpost-cicd-components/.github/workflows/reusable-docker-build.yml@dev
    with:
      image-name: singpost-app-tracking
      environment: ${{ github.ref_name == 'main' && 'prod' || github.ref_name }}
      push: ${{ github.event_name == 'push' }}
    secrets: inherit
