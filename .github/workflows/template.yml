name: Standard CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
      - 'feature/**'
  pull_request:

permissions:
  contents: read
  security-events: write
  actions: read
  id-token: write
  packages: write

jobs:
  # ==========================================
  # PARALLEL STAGE 1: FAST CHECKS
  # ==========================================
  gitleaks-scan:
    uses: nlttin/singpost-cicd-components/.github/workflows/reusable-workflow-gitleaks.yml@dev
    with:
      scan_mode: full
      config-ref: dev
      fail-on-detection: false
    secrets: inherit

  # ==========================================
  # STAGE 2: BASIC CI TEST
  # ==========================================
  app-ci-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: |
          echo "npm install..."
          npm install || true
          echo "npm test..."
          npm test --if-present

  # ==========================================
  # STAGE 3: SECURITY SCANS
  # ==========================================
  codeql-scan:
    needs: [gitleaks-scan, app-ci-test]
    uses: nlttin/singpost-cicd-components/.github/workflows/reusable-workflow-codeql.yml@dev
    with:
      language: 'javascript-typescript'
      build-mode: 'none'
      queries: 'security-extended'

  # ==========================================
  # STAGE 4: DOCKER BUILD
  # ==========================================
  build-and-push:
    needs: codeql-scan
    uses: nlttin/singpost-cicd-components/.github/workflows/reusable-docker-build.yml@dev
    with:
      image-name: 'singpost-app-tracking'
      dockerfile: 'Dockerfile'
      context: '.'
      push: false
    secrets: inherit

  database-migration:
    needs: codeql-scan
    runs-on: ubuntu-latest
    steps:
      - run: echo "Mocking Flyway migration"

  # ==========================================
  # STAGE 5: DEPLOYMENTS
  # ==========================================
  deploy-dev:
    needs: [build-and-push, database-migration]
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Mocking Cloud Deploy GKE DEV"

  deploy-prod:
    needs: [build-and-push, database-migration]
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Mocking Cloud Deploy GKE PROD"

  # ==========================================
  # STAGE 6: NOTIFY
  # ==========================================
  notify:
    if: always()
    needs: [deploy-dev, deploy-prod]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Mocking GChat Webhook"
