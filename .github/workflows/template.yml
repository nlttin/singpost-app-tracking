name: CI Pipeline

on:
  push:
    branches: [dev, main, 'feature/**']
  pull_request:
    branches: [dev, main]

permissions:
  contents: read
  security-events: write
  actions: read
  packages: write
  id-token: write

jobs:
  # ── Stage 1: Parallel fast checks ────────────────────────────────────
  gitleaks-scan:
    uses: nlttin/singpost-cicd-components/.github/workflows/reusable-workflow-gitleaks.yml@dev
    with:
      scan_mode: pr
      config-ref: dev              
      fail-on-detection: false
    secrets: inherit   

  app-ci-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  # ── Stage 2: CodeQL (needs Stage 1) ──────────────────────────────────
  codeql-scan:
    needs: [gitleaks-scan, app-ci-test]
    uses: nlttin/singpost-cicd-components/.github/workflows/reusable-workflow-codeql.yml@dev
    with:
      language: 'javascript-typescript'
      build-mode: 'none'
      queries: 'security-extended'

  # ── Stage 3: Cloud Build → GAR (needs Stage 2, push only) ──────────────
  cloud-build:
    needs: codeql-scan
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      REGION: asia-southeast1
      GAR_IMAGE: asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/sp-logistic-dev-app/singpost-app-tracking
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Submit to Cloud Build
        run: |
          gcloud builds submit \
            --project=${{ secrets.GCP_PROJECT }} \
            --config=cloudbuild.yaml \
            --substitutions=SHORT_SHA=${{ github.sha }},_IMAGE=${{ env.GAR_IMAGE }} \
            .

  # ── Stage 4: Deploy to Cloud Run (dev branch only) ───────────────────
  deploy-dev:
    needs: cloud-build
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: development
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/singpost-app-tracking:${{ github.sha }}
      CLOUD_RUN_SERVICE: sp-logistic-dev-cloudrun-app
      REGION: asia-southeast1
    steps:
      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image ${{ env.IMAGE }} \
            --region ${{ env.REGION }} \
            --project ${{ secrets.GCP_PROJECT }} \
            --quiet
