name: App CI - PR

on:
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  node-ci:
    uses: nlttin/singpost-cicd-components/.github/workflows/reusable-node-ci.yml@main
    with:
      node_version: "22"
      working_directory: "."
      install_command: "npm ci"
      test_command: "npm test"
      build_command: "npm run build"
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  dependency-review:
    if: github.event_name == 'pull_request'
    uses: nlttin/singpost-cicd-components/.github/workflows/reusable-dependency-review.yml@main

  sonarqube-disabled:
    runs-on: ubuntu-latest
    steps:
      - name: SonarQube status
        run: echo "SonarQube is temporarily disabled in this repository."