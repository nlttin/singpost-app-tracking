apiVersion: deploy.cloud.google.com/v1
kind: DeliveryPipeline
metadata:
  name: trackingingestapi-gke-pipeline
serialPipeline:
  stages:
    - targetId: dev-gke
      profiles:
        - dev
---
apiVersion: deploy.cloud.google.com/v1
kind: Target
metadata:
  name: dev-gke
gke:
  cluster: projects/PROJECT_ID/locations/REGION/clusters/CLUSTER_NAME